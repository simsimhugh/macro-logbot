name: PR Review — AI-driven SDLC

# AI-driven SDLC 자동화 워크플로우
# - 정책: docs/process/03-개발-프로세스.md
# - PR opened/synchronize/reopened 시 reviewer agent 사이클 자동 실행
# - 모든 reviewer 통과 + branch protection 조건 만족 시 자동 머지
# - Actions가 fail이면 봇 계정 + gh CLI fallback (main session orchestrator)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "수동 재실행할 PR 번호"
        required: true
        type: number

concurrency:
  group: pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write
  statuses: write

jobs:
  ai-review:
    name: AI-driven SDLC reviewer cycle
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude Code reviewer cycle
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.BOT_GH_TOKEN }}
          timeout_minutes: 30
          direct_prompt: |
            본 PR을 macro-logbot의 AI-driven SDLC 정책에 따라 review하세요.

            ## PR 정보
            - PR 번호: ${{ github.event.pull_request.number }}
            - 대상 commit: ${{ github.event.pull_request.head.sha }}
            - 브랜치: ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}

            ## 정책 문서 (필수 컨텍스트 — 먼저 읽기)
            - `docs/process/03-개발-프로세스.md` — 서브에이전트 매트릭스 + 자동 머지 정량 기준
            - `docs/design/02-설계문서.md` — 시스템 spec (현 버전)
            - `docs/process/04-PoC-운영가이드.md`
            - `CONTRIBUTING.md`

            ## 절차

            ### Step 1: PR 변경 유형 판단
            - **Spec/docs 변경 only** (`docs/process/` · `docs/design/` 만 수정): `architect` + `verifier` 두 reviewer만 호출 (§9 정책)
            - **그 외 모든 코드 변경**: `architect` → `code-reviewer` → `security-reviewer` → `test-engineer` → `verifier` 순차 호출

            ### Step 2: 각 reviewer 호출
            `Task` 도구로 OMC 서브에이전트 호출:
            ```
            Agent(subagent_type="oh-my-claudecode:<agent-name>", prompt="...")
            ```
            각 agent에 정책 문서 경로 + PR 변경 사항 + 본 PR의 acceptance criteria 전달.

            ### Step 3: 각 결과를 PR comment로 post
            `gh pr comment ${{ github.event.pull_request.number }} --body "..."` 형식. 모든 comment 공통 규칙:

            - **첫 줄**: `🤖 **[<agent-name>]**`
            - **둘째 줄**: `대상 commit: <full-hash-no-backticks>` (백틱 절대 사용 금지 — GitHub 자동 link 보존)
            - **Severity 시각화** (GitHub callout):
              ```
              > [!CAUTION]
              > **Severity: BLOCK** — 머지 차단
              ```
              ```
              > [!WARNING]
              > **Severity: WARN** — 권장 수정사항
              ```
              ```
              > [!TIP]
              > **Severity: PASS** — 머지 기준 충족
              ```
              ```
              > [!NOTE]
              > **Severity: COMMENT** — 정보성
              ```
            - **Findings 섹션** (bullet)
            - **Recommendation 섹션** (APPROVE | REQUEST_CHANGES | COMMENT)
            - **마지막 줄**: `_Auto-generated by macro-logbot AI-driven SDLC pilot._`

            ### Step 4: 시간 순서 엄수
            - **Reviewer comment를 코드 변경 commit보다 먼저 post** (timestamp 정직성)
            - 수정 commit이 필요하면: comment post 완료 후 commit (PR 페이지 흐름이 "review → 수정"으로 보이도록)
            - 수정 commit message에는 `Address <agent-name> review on PR #<N> (review of <commit-hash>)` 명시

            ### Step 5: 자동 머지 (모든 reviewer 통과 + verifier APPROVE)
            ```
            gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
            ```
            BLOCK/CRITICAL/HIGH 발견 시: executor agent 재호출로 수정 commit 작성 (max 3회).
            3회 후에도 미달이면 `needs-human-review` label 부착 + 사람 호출 comment.

            ## 자동 머지 정량 기준 (§5 from process 문서)
            ```yaml
            architect: { block: 0 }
            code_reviewer: { critical: 0, high: 0 }
            security_reviewer: { critical: 0, high: 0 }
            test_engineer:
              unit_tests_pass: true
              new_code_coverage_min: 0.80
              poc_baseline_pass: true  # poc/ 변경 PR만
            verifier:
              acceptance_criteria_satisfied: true
              spec_consistency: true
            retries: { max: 3, on_exhausted: "label_needs_human_review" }
            ```

      - name: Post failure fallback notice
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "$(cat <<'EOF'
          🤖 **[github-actions/pr-review.yml]**
          대상 commit: ${{ github.event.pull_request.head.sha }}

          > [!CAUTION]
          > **Workflow 실패** — AI-driven SDLC 자동 review가 끝까지 실행되지 못함.

          ### 다음 조치
          - main session orchestrator(봇 계정 + gh CLI)로 fallback review 진행
          - Actions 로그 점검 후 workflow 수정 PR 별도 처리

          ---
          _Auto-generated by macro-logbot AI-driven SDLC pilot._
          EOF
          )"
