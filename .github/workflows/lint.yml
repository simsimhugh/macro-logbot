name: lint

# task-AI-DLC-001 — mechanical lint server-side (memory §1, docs/process/03)
# PR mechanical 영역. AI reviewer (code-reviewer) 가 본 영역 검토 금지 (memory §3).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          # pyproject.toml 의 [tool.ruff] 설정 사용 → 별 spec 불필요.
          pip install "ruff>=0.4"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .
