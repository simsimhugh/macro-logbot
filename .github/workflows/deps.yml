name: deps

# task-AI-DLC-001 — dependency CVE scan server-side (memory §1, 옵션).
# Dependabot Alerts 가 GitHub native 로 commit 시점에 alert 게시 → 본 workflow 는
# PR 시점에 inline check. pip-audit + osv-scanner 보완 layer.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 매주 수요일 03:00 UTC.
    - cron: "0 3 * * 3"

permissions:
  contents: read

concurrency:
  group: deps-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install pip-audit + project deps
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          # project deps 의 actual installed version scan — pyproject 의 spec 만 vs 실제 휠.
          pip install -e ".[dev]"

      - name: pip-audit
        # --skip-editable: macro-logbot 자체 (local editable install) 는 PyPI 부재 → skip.
        # `|| true` : pip-audit exit non-zero (vuln 발견) 도 file 생성 보존.
        # JSON parse 후 vuln 존재 만 fail (보수). severity filter = GHSA GraphQL 필요, follow-up.
        run: |
          pip-audit --skip-editable --format=json --output=pip-audit.json || true
          python -c "
          import json, os, sys
          if not os.path.exists('pip-audit.json'):
              print('ERROR: pip-audit.json missing — pip-audit 자체 fail', file=sys.stderr)
              sys.exit(2)
          data = json.load(open('pip-audit.json'))
          high = []
          for dep in data.get('dependencies', []):
              if dep.get('skip_reason'):
                  continue
              for vuln in dep.get('vulns', []):
                  high.append({'pkg': dep['name'], 'id': vuln['id']})
          if high:
              print('vulnerabilities found:')
              for h in high:
                  print(f'  - {h[\"pkg\"]}: {h[\"id\"]}')
              sys.exit(1)
          print('no vulnerabilities')
          "

      - name: Upload pip-audit json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-json
          path: pip-audit.json
          if-no-files-found: ignore
          retention-days: 30
