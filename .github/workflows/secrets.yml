name: secrets

# task-AI-DLC-001 — secret scan server-side (memory §1).
# GitHub Push Protection 의 PR 후 backstop. Push Protection 이 commit 자체를
# 차단하지만 (서버사이드), bypass 된 secret / 이전 commit 의 추가 catch 위해 본 workflow 실행.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 매주 화요일 03:00 UTC — 새 rule 적용 catch.
    - cron: "0 3 * * 2"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        # gitleaks/gitleaks-action@v2 가 organization repo 의 license key (paid $99/mo) 의무.
        # gitleaks CLI binary 는 open-source / license 불필요. binary 직접 install + 실행.
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks scan
        # --redact : log 안 secret value redact.
        # --exit-code 1 : 발견 시 fail.
        # PR / push / schedule 모두 full history (checkout fetch-depth=0).
        run: |
          gitleaks detect \
            --source=. \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --redact \
            --no-banner \
            --exit-code=1 \
            --verbose

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 14
