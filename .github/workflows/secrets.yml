name: secrets

# task-AI-DLC-001 — secret scan server-side (memory §1).
# GitHub Push Protection 의 PR 후 backstop. Push Protection 이 commit 자체를
# 차단하지만 (서버사이드), bypass 된 secret / 이전 commit 의 추가 catch 위해 본 workflow 실행.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 매주 화요일 03:00 UTC — 새 rule 적용 catch.
    - cron: "0 3 * * 2"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # public repo → license 불필요 (organization-only 요구는 private/enterprise).
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_COMMENTS: "true"
