id: E003
title: "Off-by-one IndexError in detect_collision body scan"
category: logic
target_file: snake.py
target_function: detect_collision
injection_diff: |
  --- a/snake.py
  +++ b/snake.py
  @@ -102,8 +102,9 @@ class SnakeGame:
           if self.head.y < 0 or self.head.y >= GRID_HEIGHT:
               return True
           # body 충돌.
  -        for seg in self.body:
  -            if seg.x == self.head.x and seg.y == self.head.y:
  +        # bug: off-by-one — range 가 길이를 초과해 IndexError.
  +        for i in range(len(self.body) + 1):
  +            if self.body[i].x == self.head.x and self.body[i].y == self.head.y:
                   return True
           return False
trigger: "python snake.py --headless --auto-play 5"
ground_truth:
  root_cause: "detect_collision 의 body 스캔 루프가 range(len(self.body) + 1) 로 off-by-one — 인덱스가 길이를 초과하여 IndexError 발생"
  root_cause_keywords:
    - "IndexError"
    - "off-by-one"
    - "detect_collision"
    - "range"
  location:
    file: snake.py
    function: detect_collision
    line: 107
  fix_hint: "for seg in self.body 직접 iteration 으로 수정 또는 range(len(self.body)) 로 off-by-one 제거"
  expected_tool_calls:
    - grep_codebase
    - read_file
